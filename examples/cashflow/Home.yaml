# Cashflow Home — screen source of truth.
# Grammar: see docs/yaml-grammar.md.

name: CashflowHome

types:
  Tone: "'positive' | 'negative' | 'neutral' | 'accent'"
  NavItem: "{ label: string; to: string; current?: boolean }"
  RangeTab: "{ label: string; value: string; current?: boolean }"
  Stat: "{ label: string; value: string; delta: string; tone: Tone }"
  ActivityStatus: "'paid' | 'overdue' | 'withdraw'"
  ActivityKind: "'income' | 'outgoing' | 'recurring'"
  ActivityEntry: >
    { id: string; kind: ActivityKind; amount: string; tax?: string;
      status: ActivityStatus; counterparty: string; description: string;
      ref: string; href: string }
  ActivityGroup: "{ label: string; datetime: string; entries: ActivityEntry[] }"
  Client: >
    { id: string; name: string; logo: string;
      lastInvoice: { date: string; datetime: string; amount: string; status: ActivityStatus } }

data:
  nav:
    - { label: Home,      to: /,         current: true }
    - { label: Faturas,   to: /invoices }
    - { label: Clientes,  to: /clients }
    - { label: Despesas,  to: /expenses }

  user: { name: Tom Cook, avatar: /avatars/tom.jpg }

  ranges:
    - { label: "Últimos 7 dias",  value: 7d,  current: true }
    - { label: "Últimos 30 dias", value: 30d }
    - { label: "Todo o período",  value: all }

  stats:
    - { label: Receita,             value: "R$ 405.091", delta: "+4,75%",  tone: positive }
    - { label: Faturas em atraso,   value: "R$ 12.787",  delta: "+54,02%", tone: negative }
    - { label: Faturas em aberto,   value: "R$ 245.988", delta: "-1,39%",  tone: positive }
    - { label: Despesas,            value: "R$ 30.156",  delta: "+10,18%", tone: negative }

  activity:
    - label: Hoje
      datetime: 2026-04-23
      entries:
        - { id: "1", kind: income,    amount: "R$ 7.600",  tax: "R$ 500", status: paid,     counterparty: Reform,   description: Redesign do site, ref: "00012", href: /invoices/00012 }
        - { id: "2", kind: outgoing,  amount: "R$ 10.000",                status: withdraw, counterparty: Tom Cook, description: Salário,          ref: "00011", href: /invoices/00011 }
    - label: Ontem
      datetime: 2026-04-22
      entries:
        - { id: "3", kind: recurring, amount: "R$ 2.000",  tax: "R$ 130", status: overdue,  counterparty: Tuple,    description: Design de logo,   ref: "00009", href: /invoices/00009 }

  clients:
    - id: "1"
      name: Tuple
      logo: /logos/tuple.svg
      lastInvoice: { date: 13/12/2025, datetime: 2025-12-13, amount: "R$ 2.000",  status: overdue } # prev year → full date
    - id: "2"
      name: SavvyCal
      logo: /logos/savvycal.svg
      lastInvoice: { date: 22/01,      datetime: 2026-01-22, amount: "R$ 14.000", status: paid }
    - id: "3"
      name: Reform
      logo: /logos/reform.svg
      lastInvoice: { date: 23/01,      datetime: 2026-01-23, amount: "R$ 7.600",  status: paid }

  statusLabel:
    paid: Pago
    overdue: Em atraso
    withdraw: Saída

  statusTone:
    paid: positive
    overdue: negative
    withdraw: neutral

  kindIcon:
    income:    ArrowUpCircleIcon
    outgoing:  ArrowDownCircleIcon
    recurring: ArrowPathIcon

root:
  type: StackedShell
  nav: $nav
  user: $user
  slots:
    brand:
      - { type: Logo, src: /logo.svg, alt: Cashflow, size: lg }
  children:

    - type: PageHeading
      title: Cashflow
      slots:
        nav:
          - { type: NavTabs, items: $ranges }
        actions:
          - { type: Button, variant: primary, icon: PlusSmallIcon, text: Nova fatura }

    - { type: StatGrid, items: $stats }

    - type: PageSection
      title: Atividade recente
      children:
        - type: ActivityTable
          groups: $activity
          slots:

            icon:
              scope: entry
              children:
                - type: Icon
                  src:  ${kindIcon[entry.kind]}
                  size: md

            amount:
              scope: entry
              children:
                - type: Stack
                  gap: xs
                  children:
                    - type: Cluster
                      gap: sm
                      children:
                        - { type: Text, weight: medium, text: $entry.amount }
                        - type: StatusBadge
                          tone:  ${statusTone[entry.status]}
                          label: ${statusLabel[entry.status]}
                    - type: Text
                      if: $entry.tax
                      tone: muted
                      size: xs
                      text: "${entry.tax} imposto"

            meta:
              scope: entry
              children:
                - type: Stack
                  gap: xs
                  children:
                    - { type: Text, text: $entry.counterparty }
                    - { type: Text, tone: muted, size: xs, text: $entry.description }

            action:
              scope: entry
              children:
                - type: Stack
                  gap: xs
                  align: end
                  children:
                    - type: Link
                      to: $entry.href
                      children:
                        - "Ver"
                        - { type: VisuallyHidden, text: " transação" }
                    - { type: Text, tone: muted, size: xs, text: "Fatura #${entry.ref}" }

    - type: PageSection
      title: Clientes recentes
      actionLabel: Ver todos
      actionHref: /clients
      children:
        - type: Grid
          cols: { base: 1, lg: 3 }
          gap: lg
          tag: ul
          role: list
          children:
            - type: Card
              tag: li
              repeat: { source: $clients, as: client, key: $client.id }
              slots:
                header:
                  - type: Cluster
                    gap: md
                    align: center
                    children:
                      - { type: Logo, src: $client.logo, alt: $client.name, size: xl }
                      - { type: Text, weight: medium, text: $client.name }
                header-trailing:
                  - type: Menu
                    slots:
                      trigger:
                        - { type: Icon, src: EllipsisHorizontalIcon, size: sm, aria-hidden: true }
                    children:
                      - { type: MenuItem, to: "/clients/${client.id}",      text: Ver }
                      - { type: MenuItem, to: "/clients/${client.id}/edit", text: Editar }
              children:
                - type: DescriptionList
                  children:
                    - type: DescriptionListItem
                      label: Última fatura
                      children:
                        - { type: time, datetime: $client.lastInvoice.datetime, text: $client.lastInvoice.date }
                    - type: DescriptionListItem
                      label: Valor
                      children:
                        - type: Cluster
                          gap: sm
                          align: center
                          children:
                            - { type: Text, text: $client.lastInvoice.amount }
                            - type: StatusBadge
                              tone:  ${statusTone[client.lastInvoice.status]}
                              label: ${statusLabel[client.lastInvoice.status]}

# Cashflow Settings — screen source of truth.
# Grammar: see examples/cashflow/Home.yaml or docs/yaml-grammar.md.

name: CashflowSettings

types:
  NavItem: "{ label: string; to: string; current?: boolean }"
  NavGroupItem: "{ label: string; to: string; icon?: unknown; current?: boolean }"
  BankAccount: "{ id: string; label: string }"
  Integration: "{ id: string; label: string }"
  Profile: "{ name: string; email: string; title: string }"
  Locale: "{ language: string; dateFormat: string }"

data:
  nav:
    - { label: Home,      to: / }
    - { label: Faturas,   to: /invoices }
    - { label: Clientes,  to: /clients }
    - { label: Despesas,  to: /expenses }

  user: { name: Tom Cook, avatar: /avatars/tom.jpg }

  sections:
    - { label: Geral,          to: /settings,                icon: UserCircleIcon,     current: true }
    - { label: Segurança,      to: /settings/security,       icon: FingerPrintIcon }
    - { label: Notificações,   to: /settings/notifications,  icon: BellIcon }
    - { label: Plano,          to: /settings/plan,           icon: CubeIcon }
    - { label: Faturamento,    to: /settings/billing,        icon: CreditCardIcon }
    - { label: Membros,        to: /settings/team,           icon: UsersIcon }

  profile:
    name:  Tom Cook
    email: tom.cook@example.com
    title: Gerente de Recursos Humanos

  bankAccounts:
    - { id: "1", label: Itaú }
    - { id: "2", label: Bradesco }

  integrations:
    - { id: "1", label: QuickBooks }

  locale: { language: "Português (Brasil)", dateFormat: "DD/MM/AAAA" }

root:
  type: StackedShell
  nav: $nav
  user: $user
  slots:
    brand:
      - { type: Logo, src: /logo.svg, alt: Cashflow, size: lg }
  children:

    - type: Page
      slots:
        sidenav:
          - { type: NavGroup, items: $sections, variant: icons }
      children:

        - type: SettingsSection
          title: Perfil
          description: Estas informações são exibidas publicamente no seu perfil.
          children:
            - { type: SettingsFieldRow, label: Nome completo, value: $profile.name,  actionLabel: Atualizar }
            - { type: SettingsFieldRow, label: E-mail,        value: $profile.email, actionLabel: Atualizar }
            - { type: SettingsFieldRow, label: Cargo,         value: $profile.title, actionLabel: Atualizar }

        - type: SettingsSection
          title: Contas bancárias
          description: Conecte contas bancárias ao seu perfil.
          slots:
            actions:
              - { type: Button, variant: ghost, icon: PlusSmallIcon, text: Adicionar outro banco }
          children:
            - type: SettingsItemRow
              repeat: { source: $bankAccounts, as: account, key: $account.id }
              icon: BuildingLibraryIcon
              title: $account.label
              actionLabel: Atualizar

        - type: SettingsSection
          title: Integrações
          description: Conecte aplicações ao seu perfil.
          slots:
            actions:
              - { type: Button, variant: ghost, icon: PlusSmallIcon, text: Adicionar outra aplicação }
          children:
            - type: SettingsItemRow
              repeat: { source: $integrations, as: integration, key: $integration.id }
              icon: PuzzlePieceIcon
              title: $integration.label
              actionLabel: Atualizar

        - type: SettingsSection
          title: Idioma e formato
          description: Escolha o idioma e o formato de data utilizados na plataforma.
          children:
            - { type: SettingsFieldRow, label: Idioma,          value: $locale.language,   actionLabel: Atualizar }
            - { type: SettingsFieldRow, label: Formato de data, value: $locale.dateFormat, actionLabel: Atualizar }
            - type: SettingsToggleRow
              label: Fuso horário automático
              description: Usar o fuso detectado pelo navegador.
              checked: true

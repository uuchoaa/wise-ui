# Cashflow Detail (invoice) — screen source of truth.
# Grammar: see docs/yaml-grammar.md.
#
# Layout: Page with 2-col split on lg. Main column carries DetailHeading +
# InvoiceDocument. Right rail carries SummaryCard + Timeline + comment composer.
# This mirrors the Document archetype described in docs/archetypes.md.

name: CashflowDetail

types:
  Tone: "'positive' | 'negative' | 'neutral' | 'accent'"
  NavItem: "{ label: string; to: string; current?: boolean }"
  ActivityKind: "'created' | 'edited' | 'sent' | 'viewed' | 'paid' | 'commented'"
  ActivityEntry: >
    { id: string; kind: ActivityKind; person: { name: string; avatar?: string };
      date: string; datetime: string; comment?: string }
  InvoiceItem: >
    { id: string; title: string; description: string;
      hours: string; rate: string; price: string }
  Party: "{ name: string; lines: string[] }"

data:
  nav:
    - { label: Home,      to: / }
    - { label: Faturas,   to: /invoices, current: true }
    - { label: Clientes,  to: /clients }
    - { label: Despesas,  to: /expenses }

  user: { name: Tom Cook, avatar: /avatars/tom.jpg }

  invoice:
    ref: "00011"
    client: { name: "Tuple, Inc", logo: /logos/tuple.svg }
    amount: "R$ 10.560,00"
    status: paid
    statusLabel: Paga
    payer: Alex Curren
    issuedOn: { date: 23/01/2026, datetime: 2026-01-23 }
    dueDate:  { date: 31/01/2026, datetime: 2026-01-31 }
    paymentMethod: Paga com MasterCard
    from:
      name: "Acme, Inc."
      lines:
        - "Rua Cynthia, 7363"
        - "Pinheiros, São Paulo"
    to:
      name: "Tuple, Inc"
      lines:
        - "886 Walter Street"
        - "New York, NY 12345"
    items:
      - { id: "1", title: Redesign de logo,     description: "Novo logo e guia de ativos digitais.",   hours: "20,0", rate: "R$ 100,00", price: "R$ 2.000,00" }
      - { id: "2", title: Redesign de site,     description: "Design e desenvolvimento do novo site.", hours: "52,0", rate: "R$ 100,00", price: "R$ 5.200,00" }
      - { id: "3", title: Cartões de visita,    description: "Design e produção de 500 cartões.",      hours: "12,0", rate: "R$ 100,00", price: "R$ 1.200,00" }
      - { id: "4", title: Design de camisetas,  description: "Três conceitos de camiseta.",            hours: "4,0",  rate: "R$ 100,00", price: "R$ 400,00"   }
    subtotal: "R$ 8.800,00"
    tax:      "R$ 1.760,00"
    total:    "R$ 10.560,00"

  statusTone:
    paid:     positive
    overdue:  negative
    withdraw: neutral

  activity:
    - { id: "1", kind: created,   person: { name: Chelsea Hagon },                              date: "há 7d", datetime: 2026-04-16T10:32 }
    - { id: "2", kind: edited,    person: { name: Chelsea Hagon },                              date: "há 6d", datetime: 2026-04-17T11:03 }
    - { id: "3", kind: sent,      person: { name: Chelsea Hagon },                              date: "há 6d", datetime: 2026-04-17T11:24 }
    - { id: "4", kind: commented, person: { name: Chelsea Hagon, avatar: /avatars/hagon.jpg },  date: "há 3d", datetime: 2026-04-20T15:56, comment: "Falei com o cliente; ele confirmou que a fatura será paga até o dia 25." }
    - { id: "5", kind: viewed,    person: { name: Alex Curren },                                date: "há 2d", datetime: 2026-04-21T09:12 }
    - { id: "6", kind: paid,      person: { name: Alex Curren },                                date: "há 1d", datetime: 2026-04-22T09:20 }

  kindLabel:
    created:   criou
    edited:    editou
    sent:      enviou
    viewed:    visualizou
    paid:      pagou
    commented: comentou

root:
  type: StackedShell
  nav: $nav
  user: $user
  slots:
    brand:
      - { type: Logo, src: /logo.svg, alt: Cashflow, size: lg }
  children:

    - type: Page
      slots:

        rail:

          - type: SummaryCard
            slots:
              title:
                - type: Cluster
                  justify: between
                  align: center
                  children:
                    - type: Stack
                      gap: xs
                      children:
                        - { type: Text, tone: muted, size: sm, text: Valor }
                        - { type: Text, size: base, weight: semibold, text: $invoice.amount }
                    - type: StatusBadge
                      tone: ${statusTone[invoice.status]}
                      label: $invoice.statusLabel
              footer:
                - { type: Link, to: /invoices/00011/receipt, text: "Baixar recibo →" }
            children:
              - type: SummaryCardRow
                icon: UserCircleIcon
                label: Cliente
                children:
                  - $invoice.payer
              - type: SummaryCardRow
                icon: CalendarDaysIcon
                label: Vencimento
                children:
                  - { type: time, datetime: $invoice.dueDate.datetime, text: $invoice.dueDate.date }
              - type: SummaryCardRow
                icon: CreditCardIcon
                label: Pagamento
                children:
                  - $invoice.paymentMethod

          - type: Timeline
            items: $activity
            slots:

              event:
                scope: item
                children:
                  - { type: Text, weight: medium, text: $item.person.name }
                  - { type: Text, tone: muted, text: " ${kindLabel[item.kind]} a fatura." }
                  - { type: time, datetime: $item.datetime, text: $item.date }

              comment:
                scope: item
                children:
                  - { type: Avatar, src: $item.person.avatar, alt: $item.person.name, size: sm }
                  - type: Stack
                    gap: xs
                    children:
                      - type: Cluster
                        justify: between
                        children:
                          - type: Text
                            children:
                              - { type: Text, weight: medium, text: $item.person.name }
                              - { type: Text, tone: muted, text: " comentou" }
                          - { type: time, datetime: $item.datetime, text: $item.date }
                      - { type: Text, tone: muted, text: $item.comment }

          - type: form
            children:
              - type: Textarea
                field: body
                label: Adicionar comentário
                placeholder: "Escreva um comentário..."
                rows: 2
              - type: Cluster
                justify: between
                align: center
                children:
                  - { type: Button, variant: ghost,     icon: PaperClipIcon, "aria-label": Anexar arquivo }
                  - { type: Button, variant: secondary, type: submit,        text: Comentar }

      children:

        - type: DetailHeading
          eyebrow: "Fatura #${invoice.ref}"
          title: $invoice.client.name
          slots:
            leading:
              - { type: Logo, src: $invoice.client.logo, alt: $invoice.client.name, size: xl }
            actions:
              - { type: Button, variant: ghost,     text: Copiar URL }
              - { type: Button, variant: ghost,     text: Editar }
              - { type: Button, variant: primary,   text: Enviar }

        - type: InvoiceDocument
          issuedOn: $invoice.issuedOn
          dueOn:    $invoice.dueDate
          from:     $invoice.from
          to:       $invoice.to
          items:    $invoice.items
          subtotal: $invoice.subtotal
          tax:      $invoice.tax
          total:    $invoice.total

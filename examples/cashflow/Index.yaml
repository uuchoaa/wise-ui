# Cashflow Index (invoices) — screen source of truth.
# Grammar: see docs/yaml-grammar.md.

name: CashflowIndex

types:
  Tone: "'positive' | 'negative' | 'neutral' | 'accent'"
  NavItem: "{ label: string; to: string; current?: boolean }"
  StatusTab: "{ label: string; value: string; current?: boolean }"
  Column: "{ key: string; label: string; align?: 'start' | 'end' }"
  InvoiceStatus: "'paid' | 'open' | 'overdue'"
  Invoice: >
    { id: string; ref: string; href: string;
      client: { name: string; logo: string };
      amount: string;
      dueDate: { date: string; datetime: string };
      status: InvoiceStatus }
  Pagination: >
    { summary: string; hasPrev: boolean; hasNext: boolean }

data:
  nav:
    - { label: Home,      to: / }
    - { label: Faturas,   to: /invoices, current: true }
    - { label: Clientes,  to: /clients }
    - { label: Despesas,  to: /expenses }

  user: { name: Tom Cook, avatar: /avatars/tom.jpg }

  statusTabs:
    - { label: Todas,      value: all, current: true }
    - { label: Em aberto,  value: open }
    - { label: Pagas,      value: paid }
    - { label: Em atraso,  value: overdue }

  columns:
    - { key: client,  label: Cliente }
    - { key: amount,  label: Valor }
    - { key: due,     label: Vencimento }
    - { key: status,  label: Status }
    - { key: actions, label: "",       align: end }

  invoices:
    - { id: "1", ref: "00012", href: /invoices/00012, client: { name: Reform,    logo: /logos/reform.svg    }, amount: "R$ 7.600,00",  dueDate: { date: 30/04/2026, datetime: 2026-04-30 }, status: open    }
    - { id: "2", ref: "00011", href: /invoices/00011, client: { name: "Tuple, Inc", logo: /logos/tuple.svg  }, amount: "R$ 10.560,00", dueDate: { date: 31/01/2026, datetime: 2026-01-31 }, status: paid    }
    - { id: "3", ref: "00010", href: /invoices/00010, client: { name: SavvyCal,  logo: /logos/savvycal.svg  }, amount: "R$ 14.000,00", dueDate: { date: 22/01/2026, datetime: 2026-01-22 }, status: paid    }
    - { id: "4", ref: "00009", href: /invoices/00009, client: { name: Tuple,     logo: /logos/tuple.svg     }, amount: "R$ 2.000,00",  dueDate: { date: 13/12/2025, datetime: 2025-12-13 }, status: overdue }
    - { id: "5", ref: "00008", href: /invoices/00008, client: { name: Hellonext, logo: /logos/hellonext.svg }, amount: "R$ 3.200,00",  dueDate: { date: 05/05/2026, datetime: 2026-05-05 }, status: open    }
    - { id: "6", ref: "00007", href: /invoices/00007, client: { name: Laravel,   logo: /logos/laravel.svg   }, amount: "R$ 5.400,00",  dueDate: { date: 08/12/2025, datetime: 2025-12-08 }, status: overdue }

  statusLabel:
    paid:    Paga
    open:    Em aberto
    overdue: Em atraso

  statusTone:
    paid:    positive
    open:    neutral
    overdue: negative

  pagination:
    summary: "1 – 6 de 42"
    hasPrev: false
    hasNext: true

root:
  type: StackedShell
  nav: $nav
  user: $user
  slots:
    brand:
      - { type: Logo, src: /logo.svg, alt: Cashflow, size: lg }
  children:

    - type: PageHeading
      title: Faturas
      slots:
        nav:
          - { type: NavTabs, items: $statusTabs }
        actions:
          - { type: Button, variant: primary, icon: PlusSmallIcon, text: Nova fatura }

    - type: Cluster
      justify: between
      align: center
      children:
        - { type: SearchField, placeholder: "Buscar faturas" }
        - { type: Button, variant: ghost, text: Exportar }

    - type: ResourceTable
      columns: $columns
      items: $invoices
      slots:

        client:
          scope: item
          children:
            - type: Cluster
              gap: sm
              align: center
              children:
                - { type: Logo, src: $item.client.logo, alt: $item.client.name, size: md }
                - { type: Text, weight: medium, text: $item.client.name }

        amount:
          scope: item
          children:
            - { type: Text, text: $item.amount }

        due:
          scope: item
          children:
            - { type: time, datetime: $item.dueDate.datetime, text: $item.dueDate.date }

        status:
          scope: item
          children:
            - type: StatusBadge
              tone:  ${statusTone[item.status]}
              label: ${statusLabel[item.status]}

        actions:
          scope: item
          children:
            - { type: Link, to: $item.href, text: "Ver" }

    - type: Pagination
      summary: $pagination.summary
      hasPrev: $pagination.hasPrev
      hasNext: $pagination.hasNext
